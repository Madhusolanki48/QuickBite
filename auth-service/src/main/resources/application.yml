server:
  port: 8081
spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:h2:mem:quickbite_auth;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate.format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  rabbitmq:
    enabled: ${QUICKBITE_RABBITMQ_ENABLED:false}
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
jwt:
  secret: ${JWT_SECRET:quickbite-auth-default-secret-key-change-me-1234567890}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}
quickbite:
  google:
    client-id: ${GOOGLE_CLIENT_ID:657167715760-nl47ceicarqnu2q296mpl2fmm3oubh5t.apps.googleusercontent.com}
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
