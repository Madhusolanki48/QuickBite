server:
  port: ${PORT:8080}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns:
              - http://localhost:4200
              - http://localhost:5173
              - http://localhost:3000
              - http://127.0.0.1:4200
              - http://127.0.0.1:5173
              - http://127.0.0.1:3000
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            exposedHeaders:
              - Authorization
              - Location
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:lb://auth-service}
          predicates:
            - Path=/api/auth/**

        - id: auth-service-alias
          uri: ${AUTH_SERVICE_URL:lb://auth-service}
          predicates:
            - Path=/auth/**

        - id: restaurant-service
          uri: ${RESTAURANT_SERVICE_URL:lb://restaurant-service}
          predicates:
            - Path=/api/restaurants/**

        - id: menu-service
          uri: ${RESTAURANT_SERVICE_URL:lb://restaurant-service}
          predicates:
            - Path=/api/menu/**

        - id: payment-service
          uri: ${PAYMENT_SERVICE_URL:lb://payment-service}
          predicates:
            - Path=/api/payments/**

        - id: wallet-service
          uri: ${PAYMENT_SERVICE_URL:lb://payment-service}
          predicates:
            - Path=/api/payments/wallet/**

        - id: delivery-service
          uri: ${DELIVERY_SERVICE_URL:lb://delivery-service}
          predicates:
            - Path=/api/deliveries/**

        - id: delivery-agent-service
          uri: ${DELIVERY_SERVICE_URL:lb://delivery-service}
          predicates:
            - Path=/api/delivery-agents/**

        - id: review-service
          uri: ${REVIEW_SERVICE_URL:lb://review-service}
          predicates:
            - Path=/api/reviews/**

        - id: cart-service
          uri: ${CART_SERVICE_URL:lb://cart-service}
          predicates:
            - Path=/api/cart/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
    register-with-eureka: false
    fetch-registry: true
  instance:
    prefer-ip-address: true

razorpay:
  key-id: ${RAZORPAY_KEY_ID:}
  key-secret: ${RAZORPAY_KEY_SECRET:}
  currency: ${RAZORPAY_CURRENCY:INR}
  api-base-url: ${RAZORPAY_API_BASE_URL:https://api.razorpay.com/v1}

management:
  endpoints:
    web:
      exposure:
        include: health,info
